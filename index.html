<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRABON | Android Gesture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/geometries/TextGeometry.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #camera-feed {
            position: absolute; bottom: 15px; left: 15px; width: 100px; height: 130px;
            border: 2px solid #00f2ff; border-radius: 10px; overflow: hidden;
            transform: scaleX(-1); z-index: 20; background: #111;
        }
        #intro-screen {
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000;
        }
        .neon-glow { color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="text-5xl font-black neon-glow mb-4 italic">SRABON</h1>
        <p class="text-gray-500 mb-8 font-mono text-xs tracking-widest uppercase">Android AR Interface</p>
        <button id="start-engine" class="px-10 py-4 border-2 border-cyan-400 text-cyan-400 font-bold rounded-full active:bg-cyan-400 active:text-black transition-all">
            START CAMERA
        </button>
    </div>

    <div id="camera-feed">
        <video id="input_video" class="w-full h-full object-cover" playsinline></video>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-engine');
        const intro = document.getElementById('intro-screen');
        
        let scene, camera, renderer, textMesh, hands;

        function initApp() {
            // 1. Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. Light
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            
            // 3. Load "SRABON" Text
            const fontLoader = new THREE.FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const geo = new THREE.TextGeometry('SRABON', {
                    font: font, size: 8, height: 2, curveSegments: 4,
                    bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.1
                });
                geo.center();
                const mat = new THREE.MeshNormalMaterial();
                textMesh = new THREE.Mesh(geo, mat);
                scene.add(textMesh);
            });

            camera.position.z = 50;

            // 4. MediaPipe for Android
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // Critical for Android performance
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && textMesh) {
                    const hand = results.multiHandLandmarks[0];
                    const index = hand[8]; // Index finger tip
                    const thumb = hand[4]; // Thumb tip

                    // Map hand movement to 3D rotation
                    textMesh.rotation.y = (index.x - 0.5) * 4;
                    textMesh.rotation.x = (index.y - 0.5) * 4;

                    // Pinch logic for Zoom
                    const dist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                    camera.position.z = 80 - (dist * 150);
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 480, height: 640
            });
            cam.start();
        }

        startBtn.addEventListener('click', () => {
            intro.style.display = 'none';
            initApp();
            animate();
        });

        function animate() {
            requestAnimationFrame(animate);
            if (textMesh) {
                textMesh.position.y = Math.sin(Date.now() * 0.002) * 1.2; // Hover effect
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (!camera) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
